name: Build Notes

on:
  push:
    branches: [main]
    paths: ['typst/**']
  pull_request:
    paths: ['typst/**']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v5

      - name: Install Latin Modern fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-lmodern

      - name: Install Font Awesome 6
        run: |
          mkdir -p .fonts
          FA_VERSION=6.7.2
          wget -q "https://use.fontawesome.com/releases/v${FA_VERSION}/fontawesome-free-${FA_VERSION}-desktop.zip" -O fa.zip
          unzip -q fa.zip -d .fonts
          rm fa.zip

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install touying exporter
        run: pip install -U touying

      - name: Compile PDFs
        env:
          TYPST_FONT_PATHS: .fonts
        run: |
          for f in typst/[0-9]*.typ; do
            name=$(basename "$f" .typ)
            typst compile "$f" "${name}.pdf"
          done

      - name: Compile HTML
        env:
          TYPST_FONT_PATHS: .fonts
        run: |
          mkdir -p html
          for f in typst/[0-9]*.typ; do
            name=$(basename "$f" .typ)
            touying compile "$f" --font-paths .fonts --output "html/${name}.html"
          done

      - name: Commit PDFs and HTML
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.pdf html/
          git diff --cached --quiet || git commit -m "Build PDFs and HTML"
          git push

      - name: Prepare Pages site
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          mkdir -p _site
          cp *.pdf _site/
          cp -r html _site/

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
